<!DOCTYPE html>
<html lang="en">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>CRUD Manager</title>
    <link href="https://fonts.googleapis.com/css2?family=Inter:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        *, *::before, *::after {
            box-sizing: border-box;
            margin: 0;
            padding: 0;
        }

        :root {
            --bg-primary: #0f0f1a;
            --bg-secondary: #1a1a2e;
            --bg-card: #16213e;
            --bg-input: #0f3460;
            --accent: #e94560;
            --accent-hover: #ff6b81;
            --accent-glow: rgba(233, 69, 96, 0.3);
            --text-primary: #eaeaea;
            --text-secondary: #a0a0b8;
            --text-muted: #6c6c80;
            --border: rgba(255, 255, 255, 0.06);
            --success: #00d68f;
            --warning: #ffaa00;
            --danger: #ff4757;
            --radius: 12px;
            --shadow: 0 8px 32px rgba(0, 0, 0, 0.4);
        }

        body {
            font-family: 'Inter', -apple-system, BlinkMacSystemFont, sans-serif;
            background: var(--bg-primary);
            color: var(--text-primary);
            min-height: 100vh;
            overflow-x: hidden;
        }

        body::before {
            content: '';
            position: fixed;
            top: -50%;
            left: -50%;
            width: 200%;
            height: 200%;
            background: radial-gradient(circle at 30% 20%, rgba(233, 69, 96, 0.05) 0%, transparent 50%),
                        radial-gradient(circle at 70% 80%, rgba(15, 52, 96, 0.15) 0%, transparent 50%);
            z-index: -1;
            animation: bgShift 20s ease-in-out infinite alternate;
        }

        @keyframes bgShift {
            0% { transform: translate(0, 0); }
            100% { transform: translate(3%, -3%); }
        }

        .container {
            max-width: 960px;
            margin: 0 auto;
            padding: 40px 24px;
        }

        /* Header */
        .header {
            text-align: center;
            margin-bottom: 48px;
        }

        .header h1 {
            font-size: 2.5rem;
            font-weight: 700;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover), #f8a5c2);
            -webkit-background-clip: text;
            -webkit-text-fill-color: transparent;
            background-clip: text;
            margin-bottom: 8px;
            letter-spacing: -0.5px;
        }

        .header p {
            color: var(--text-secondary);
            font-size: 1rem;
            font-weight: 300;
        }

        /* Card */
        .card {
            background: var(--bg-card);
            border: 1px solid var(--border);
            border-radius: var(--radius);
            padding: 32px;
            box-shadow: var(--shadow);
            margin-bottom: 32px;
            backdrop-filter: blur(10px);
            transition: transform 0.2s ease, box-shadow 0.2s ease;
        }

        .card:hover {
            box-shadow: 0 12px 40px rgba(0, 0, 0, 0.5);
        }

        .card-title {
            font-size: 1.2rem;
            font-weight: 600;
            margin-bottom: 24px;
            display: flex;
            align-items: center;
            gap: 10px;
        }

        .card-title .icon {
            width: 32px;
            height: 32px;
            background: linear-gradient(135deg, var(--accent), var(--accent-hover));
            border-radius: 8px;
            display: flex;
            align-items: center;
            justify-content: center;
            font-size: 1rem;
        }

        /* Form */
        .form-grid {
            display: grid;
            grid-template-columns: 1fr 1fr;
            gap: 16px;
        }

        .form-group {
            display: flex;
            flex-direction: column;
            gap: 6px;
        }

        .form-group.full-width {
            grid-column: 1 / -1;
        }

        .form-group label {
            font-size: 0.8rem;
            font-weight: 500;
            color: var(--text-secondary);
            text-transform: uppercase;
            letter-spacing: 0.5px;
        }

        .form-group input,
        .form-group textarea {
            background: var(--bg-input);
            border: 1px solid var(--border);
            border-radius: 8px;
            padding: 12px 16px;
            color: var(--text-primary);
            font-family: inherit;
            font-size: 0.95rem;
            transition: border-color 0.2s, box-shadow 0.2s;
            outline: none;
        }

        .form-group input:focus,
        .form-group textarea:focus {
            border-color: var(--accent);
            box-shadow: 0 0 0 3px var(--accent-glow);
        }

        .form-group textarea {
            resize: vertical;
            min-height: 80px;
        }

        .form-actions {
            grid-column: 1 / -1;
            display: flex;
            gap: 12px;
            margin-top: 8px;
        }

        /* Buttons */
        .btn {
            padding: 10px 24px;
            border: none;
            border-radius: 8px;
            font-family: inherit;
            font-size: 0.9rem;
            font-weight: 600;
            cursor: pointer;
            transition: all 0.2s ease;
            display: inline-flex;
            align-items: center;
            gap: 6px;
        }

        .btn-primary {
            background: linear-gradient(135deg, var(--accent), #c42b4b);
            color: #fff;
            box-shadow: 0 4px 15px var(--accent-glow);
        }

        .btn-primary:hover {
            transform: translateY(-2px);
            box-shadow: 0 6px 25px var(--accent-glow);
        }

        .btn-secondary {
            background: var(--bg-secondary);
            color: var(--text-secondary);
            border: 1px solid var(--border);
        }

        .btn-secondary:hover {
            background: var(--bg-input);
            color: var(--text-primary);
        }

        .btn-icon {
            width: 34px;
            height: 34px;
            padding: 0;
            display: inline-flex;
            align-items: center;
            justify-content: center;
            border-radius: 8px;
            border: none;
            cursor: pointer;
            font-size: 1rem;
            transition: all 0.2s ease;
        }

        .btn-edit {
            background: rgba(0, 214, 143, 0.12);
            color: var(--success);
        }

        .btn-edit:hover {
            background: rgba(0, 214, 143, 0.25);
            transform: translateY(-1px);
        }

        .btn-delete {
            background: rgba(255, 71, 87, 0.12);
            color: var(--danger);
        }

        .btn-delete:hover {
            background: rgba(255, 71, 87, 0.25);
            transform: translateY(-1px);
        }

        /* Table */
        .table-wrapper {
            overflow-x: auto;
        }

        table {
            width: 100%;
            border-collapse: separate;
            border-spacing: 0;
        }

        thead th {
            text-align: left;
            font-size: 0.75rem;
            font-weight: 600;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.8px;
            padding: 12px 16px;
            border-bottom: 1px solid var(--border);
        }

        tbody tr {
            transition: background 0.15s ease;
        }

        tbody tr:hover {
            background: rgba(255, 255, 255, 0.02);
        }

        tbody td {
            padding: 14px 16px;
            border-bottom: 1px solid var(--border);
            font-size: 0.9rem;
            color: var(--text-primary);
            vertical-align: middle;
        }

        .item-name {
            font-weight: 600;
        }

        .item-desc {
            color: var(--text-secondary);
            max-width: 260px;
            white-space: nowrap;
            overflow: hidden;
            text-overflow: ellipsis;
        }

        .item-price {
            font-weight: 600;
            color: var(--success);
        }

        .item-date {
            color: var(--text-muted);
            font-size: 0.82rem;
        }

        .actions-cell {
            display: flex;
            gap: 6px;
        }

        /* Empty state */
        .empty-state {
            text-align: center;
            padding: 60px 20px;
            color: var(--text-muted);
        }

        .empty-state .empty-icon {
            font-size: 3rem;
            margin-bottom: 16px;
            opacity: 0.4;
        }

        .empty-state p {
            font-size: 1rem;
        }

        /* Toast */
        .toast-container {
            position: fixed;
            bottom: 24px;
            right: 24px;
            z-index: 9999;
            display: flex;
            flex-direction: column;
            gap: 8px;
        }

        .toast {
            padding: 12px 20px;
            border-radius: 10px;
            font-size: 0.88rem;
            font-weight: 500;
            color: #fff;
            box-shadow: 0 8px 24px rgba(0, 0, 0, 0.4);
            animation: slideIn 0.3s ease, fadeOut 0.3s ease 2.5s forwards;
            backdrop-filter: blur(8px);
        }

        .toast.success { background: rgba(0, 214, 143, 0.9); }
        .toast.error { background: rgba(255, 71, 87, 0.9); }

        @keyframes slideIn {
            from { transform: translateX(100%); opacity: 0; }
            to { transform: translateX(0); opacity: 1; }
        }

        @keyframes fadeOut {
            to { opacity: 0; transform: translateY(10px); }
        }

        /* Stats bar */
        .stats-bar {
            display: flex;
            gap: 16px;
            margin-bottom: 20px;
        }

        .stat {
            background: var(--bg-secondary);
            border: 1px solid var(--border);
            border-radius: 10px;
            padding: 16px 24px;
            flex: 1;
            text-align: center;
        }

        .stat-value {
            font-size: 1.5rem;
            font-weight: 700;
            color: var(--accent-hover);
        }

        .stat-label {
            font-size: 0.72rem;
            color: var(--text-muted);
            text-transform: uppercase;
            letter-spacing: 0.5px;
            margin-top: 4px;
        }

        /* Loader */
        .spinner {
            display: none;
            width: 18px;
            height: 18px;
            border: 2px solid rgba(255,255,255,0.3);
            border-top-color: #fff;
            border-radius: 50%;
            animation: spin 0.6s linear infinite;
        }

        @keyframes spin { to { transform: rotate(360deg); } }

        /* Responsive */
        @media (max-width: 640px) {
            .form-grid {
                grid-template-columns: 1fr;
            }

            .header h1 {
                font-size: 1.8rem;
            }

            .stats-bar {
                flex-direction: column;
            }
        }
    </style>
</head>
<body>
    <div class="container">
        <div class="header">
            <h1>⚡ CRUD Manager</h1>
            <p>Create, read, update, and delete items with ease</p>
        </div>

        <!-- Stats -->
        <div class="stats-bar">
            <div class="stat">
                <div class="stat-value" id="totalCount">0</div>
                <div class="stat-label">Total Items</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="totalValue">$0.00</div>
                <div class="stat-label">Total Value</div>
            </div>
            <div class="stat">
                <div class="stat-value" id="avgPrice">$0.00</div>
                <div class="stat-label">Avg Price</div>
            </div>
        </div>

        <!-- Form -->
        <div class="card">
            <div class="card-title">
                <span class="icon">✏️</span>
                <span id="formTitle">Add New Item</span>
            </div>
            <form id="itemForm" class="form-grid">
                <input type="hidden" id="editId">
                <div class="form-group">
                    <label for="name">Name</label>
                    <input type="text" id="name" placeholder="Item name" required maxlength="100">
                </div>
                <div class="form-group">
                    <label for="price">Price ($)</label>
                    <input type="number" id="price" placeholder="0.00" step="0.01" min="0.01" required>
                </div>
                <div class="form-group full-width">
                    <label for="description">Description</label>
                    <textarea id="description" placeholder="Optional description..." maxlength="500"></textarea>
                </div>
                <div class="form-actions">
                    <button type="submit" class="btn btn-primary" id="submitBtn">
                        <span id="submitText">Create Item</span>
                        <div class="spinner" id="spinner"></div>
                    </button>
                    <button type="button" class="btn btn-secondary" id="cancelBtn" style="display:none" onclick="resetForm()">
                        Cancel
                    </button>
                </div>
            </form>
        </div>

        <!-- Items Table -->
        <div class="card">
            <div class="card-title">
                <span class="icon">📦</span>
                All Items
            </div>
            <div class="table-wrapper">
                <table>
                    <thead>
                        <tr>
                            <th>ID</th>
                            <th>Name</th>
                            <th>Description</th>
                            <th>Price</th>
                            <th>Created</th>
                            <th>Actions</th>
                        </tr>
                    </thead>
                    <tbody id="itemsBody">
                    </tbody>
                </table>
                <div class="empty-state" id="emptyState">
                    <div class="empty-icon">📭</div>
                    <p>No items yet. Create your first one above!</p>
                </div>
            </div>
        </div>
    </div>

    <div class="toast-container" id="toastContainer"></div>

    <script>
        const API = '/items';

        // --- Toast ---
        function toast(message, type = 'success') {
            const container = document.getElementById('toastContainer');
            const el = document.createElement('div');
            el.className = `toast ${type}`;
            el.textContent = message;
            container.appendChild(el);
            setTimeout(() => el.remove(), 3000);
        }

        // --- Fetch items ---
        async function loadItems() {
            try {
                const res = await fetch(API + '/');
                const items = await res.json();
                renderItems(items);
                updateStats(items);
            } catch (err) {
                toast('Failed to load items', 'error');
            }
        }

        // --- Render ---
        function renderItems(items) {
            const tbody = document.getElementById('itemsBody');
            const empty = document.getElementById('emptyState');

            if (items.length === 0) {
                tbody.innerHTML = '';
                empty.style.display = 'block';
                return;
            }

            empty.style.display = 'none';
            tbody.innerHTML = items.map(item => `
                <tr>
                    <td style="color: var(--text-muted); font-weight: 500;">#${item.id}</td>
                    <td class="item-name">${escapeHtml(item.name)}</td>
                    <td class="item-desc" title="${escapeHtml(item.description)}">${escapeHtml(item.description) || '—'}</td>
                    <td class="item-price">$${Number(item.price).toFixed(2)}</td>
                    <td class="item-date">${formatDate(item.created_at)}</td>
                    <td>
                        <div class="actions-cell">
                            <button class="btn-icon btn-edit" onclick="editItem(${item.id})" title="Edit">✏️</button>
                            <button class="btn-icon btn-delete" onclick="deleteItem(${item.id})" title="Delete">🗑️</button>
                        </div>
                    </td>
                </tr>
            `).join('');
        }

        function updateStats(items) {
            document.getElementById('totalCount').textContent = items.length;
            const total = items.reduce((sum, i) => sum + i.price, 0);
            document.getElementById('totalValue').textContent = `$${total.toFixed(2)}`;
            document.getElementById('avgPrice').textContent = items.length
                ? `$${(total / items.length).toFixed(2)}`
                : '$0.00';
        }

        // --- Create / Update ---
        document.getElementById('itemForm').addEventListener('submit', async (e) => {
            e.preventDefault();
            const spinner = document.getElementById('spinner');
            const submitText = document.getElementById('submitText');
            spinner.style.display = 'inline-block';

            const body = {
                name: document.getElementById('name').value.trim(),
                description: document.getElementById('description').value.trim(),
                price: parseFloat(document.getElementById('price').value),
            };

            const editId = document.getElementById('editId').value;

            try {
                const url = editId ? `${API}/${editId}` : `${API}/`;
                const method = editId ? 'PUT' : 'POST';
                const res = await fetch(url, {
                    method,
                    headers: { 'Content-Type': 'application/json' },
                    body: JSON.stringify(body),
                });

                if (!res.ok) {
                    const err = await res.json();
                    throw new Error(err.detail || 'Request failed');
                }

                toast(editId ? 'Item updated!' : 'Item created!');
                resetForm();
                loadItems();
            } catch (err) {
                toast(err.message, 'error');
            } finally {
                spinner.style.display = 'none';
            }
        });

        // --- Edit ---
        async function editItem(id) {
            try {
                const res = await fetch(`${API}/${id}`);
                const item = await res.json();

                document.getElementById('editId').value = item.id;
                document.getElementById('name').value = item.name;
                document.getElementById('description').value = item.description;
                document.getElementById('price').value = item.price;
                document.getElementById('formTitle').textContent = `Edit Item #${item.id}`;
                document.getElementById('submitText').textContent = 'Update Item';
                document.getElementById('cancelBtn').style.display = 'inline-flex';

                document.getElementById('itemForm').scrollIntoView({ behavior: 'smooth' });
            } catch (err) {
                toast('Failed to load item', 'error');
            }
        }

        // --- Delete ---
        async function deleteItem(id) {
            if (!confirm('Delete this item?')) return;
            try {
                const res = await fetch(`${API}/${id}`, { method: 'DELETE' });
                if (!res.ok && res.status !== 204) throw new Error('Delete failed');
                toast('Item deleted');
                loadItems();
            } catch (err) {
                toast(err.message, 'error');
            }
        }

        // --- Reset form ---
        function resetForm() {
            document.getElementById('itemForm').reset();
            document.getElementById('editId').value = '';
            document.getElementById('formTitle').textContent = 'Add New Item';
            document.getElementById('submitText').textContent = 'Create Item';
            document.getElementById('cancelBtn').style.display = 'none';
        }

        // --- Helpers ---
        function escapeHtml(text) {
            if (!text) return '';
            const div = document.createElement('div');
            div.textContent = text;
            return div.innerHTML;
        }

        function formatDate(iso) {
            const d = new Date(iso);
            return d.toLocaleDateString('en-US', { month: 'short', day: 'numeric', hour: '2-digit', minute: '2-digit' });
        }

        // --- Init ---
        loadItems();
    </script>
</body>
</html>
